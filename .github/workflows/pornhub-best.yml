name: pornhub-best

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Public Pornhub video URL"
        required: true
        type: string
      quality:
        description: "Video quality"
        required: true
        type: choice
        default: "best"
        options:
          - "360"
          - "480"
          - "720"
          - "1080"
          - "best"

permissions:
  contents: write
  actions: read

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install --upgrade --pre yt-dlp
          yt-dlp --version
          ffmpeg -version | head -n 1

      - name: Download public Pornhub video with browser headers
        shell: bash
        env:
          URL: ${{ github.event.inputs.url }}
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          set -euo pipefail

          rm -rf downloads logs
          mkdir -p downloads logs

          if ! echo "$URL" | grep -Eiq '^https?://([^/]+\.)?pornhub\.com/'; then
            echo "Only public Pornhub URLs are allowed."
            exit 1
          fi

          VIEWKEY="$(echo "$URL" | sed -n 's/.*viewkey=\([^&?#]*\).*/\1/p')"

          if [ -z "$VIEWKEY" ]; then
            echo "Could not find viewkey in URL."
            exit 1
          fi

          URL1="https://www.pornhub.com/view_video.php?viewkey=$VIEWKEY"
          URL2="https://m.pornhub.com/view_video.php?viewkey=$VIEWKEY"

          case "$QUALITY" in
            360) FORMAT='bv*[height<=360]+ba/b[height<=360]/best[height<=360]/best' ;;
            480) FORMAT='bv*[height<=480]+ba/b[height<=480]/best[height<=480]/best' ;;
            720) FORMAT='bv*[height<=720]+ba/b[height<=720]/best[height<=720]/best' ;;
            1080) FORMAT='bv*[height<=1080]+ba/b[height<=1080]/best[height<=1080]/best' ;;
            best) FORMAT='bv*+ba/best' ;;
            *) echo "Unknown quality: $QUALITY"; exit 1 ;;
          esac

          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"

          common_args=(
            --user-agent "$UA"
            --referer "https://www.pornhub.com/"
            --add-header "Accept-Language: en-US,en;q=0.9"
            --add-header "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
            --no-playlist
            --force-ipv4
            --retries 10
            --fragment-retries 30
            --extractor-retries 3
            --concurrent-fragments 4
            --restrict-filenames
            --windows-filenames
            --trim-filenames 180
            --newline
            --progress
          )

          SUCCESS=0

          for TRY_URL in "$URL1" "$URL2"; do
            echo "Testing: $TRY_URL" | tee -a logs/test.log

            if yt-dlp "${common_args[@]}" --simulate --skip-download "$TRY_URL" 2>&1 | tee -a logs/test.log; then
              echo "Test passed. Downloading: $TRY_URL" | tee -a logs/download.log

              if yt-dlp "${common_args[@]}" \
                -P downloads \
                -o "Pornhub/%(title).180B_%(id)s.%(ext)s" \
                -f "$FORMAT" \
                --merge-output-format mp4 \
                --remux-video mp4 \
                --continue \
                --no-overwrites \
                "$TRY_URL" 2>&1 | tee -a logs/download.log; then

                VIDEO_COUNT="$(find downloads -type f \( -iname '*.mp4' -o -iname '*.mkv' -o -iname '*.webm' \) | wc -l)"

                if [ "$VIDEO_COUNT" -gt 0 ]; then
                  SUCCESS=1
                  break
                fi
              fi
            fi

            echo "This URL variant failed. Trying next one..." | tee -a logs/download.log
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "Download failed. No fake artifact or fake release will be created."
            exit 1
          fi

          find downloads -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.webm" \) -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pornhub-${{ github.event.inputs.quality }}
          path: |
            downloads/**/*.mp4
            downloads/**/*.mkv
            downloads/**/*.webm
          retention-days: 1
          if-no-files-found: error
          compression-level: 0

      - name: Make unique release ZIP
        shell: bash
        run: |
          set -euo pipefail

          TS="$(date -u +%Y%m%d-%H%M%S)"
          export ASSET_NAME="video-${{ github.run_number }}-${TS}.zip"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

          python3 - <<'PYZIP'
          import os
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED

          src = Path("downloads")
          asset = os.environ["ASSET_NAME"]

          files = [
              p for p in src.rglob("*")
              if p.is_file() and p.suffix.lower() in [".mp4", ".mkv", ".webm"]
          ]

          if not files:
              raise SystemExit("No real video files found. Release ZIP will not be created.")

          with ZipFile(asset, "w", ZIP_DEFLATED) as z:
              for f in files:
                  z.write(f, f.relative_to(src.parent))
          PYZIP

          ls -lh "$ASSET_NAME"

      - name: Upload unique ZIP to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          TAG="p-${{ github.run_number }}-$(date -u +%Y%m%d-%H%M%S)"

          gh release create "$TAG" "$ASSET_NAME" \
            --repo "${{ github.repository }}" \
            --title "update" \
            --notes "update" \
            --latest

          echo "Release file name:"
          echo "$ASSET_NAME"
          echo "Download link:"
          echo "https://github.com/${{ github.repository }}/releases/download/$TAG/$ASSET_NAME"
